name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync and lint
        run: uv sync --extra dev && uv run ruff check lean2py tests
      - name: Tests
        run: uv run pytest -m "not lean" -q
